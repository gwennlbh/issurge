name: builds

on:
  push:
    branches: [develop, main]
    tags:
      - "v\\d+\\.\\d+\\.\\d+[ab]?"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    strategy:
      matrix:
        python-version: [3.12, 3.13, 3.14]
        is-latest: [false, false, true]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: yezz123/setup-uv@4819cd88f8d0991d99e4d10c85da3e4d22528951 # v4
      - name: Run unit tests
        run: uv run pytest
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: matrix.is-latest
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: matrix.is-latest && !cancelled()
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  upload-package:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.4"
      - uses: yezz123/setup-uv@4819cd88f8d0991d99e4d10c85da3e4d22528951 # v4
      - name: Run unit tests
        run: uv run pytest
      - name: Build Python package
        run: uv build
      - name: Publish to PyPI
        run: uv publish
      - name: Get changelog changes
        id: changelog
        run: |
          echo 'releaseNotes<<EOF' >> "$GITHUB_OUTPUT"
          uv run keepachangelog show $(echo ${{ github.ref_name }} | cut -c 2-) >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - name: Debug
        run: |
          echo "Release notes: ${{ steps.changelog.outputs.releaseNotes }}"
          echo "Release version: ${{ github.ref_name }}"
      - name: Create github release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.releaseNotes }}
      - name: Update PKGBUILD
        run: uvx pypi2aur update || exit 0
      - run: git diff
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgbuild: ./PKGBUILD
          pkgname: issurge
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
