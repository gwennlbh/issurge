name: Trigger release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Bump type
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  trigger-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ssh-key: ${{ secrets.AUTOCOMMITS_DEPLOY_KEY }} 
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14.4"
      - uses: yezz123/setup-uv@4819cd88f8d0991d99e4d10c85da3e4d22528951 # v4
      - run: uv run bumpver update --${{ inputs.bump }}
      - name: Get new version
        id: pyproject
        uses: maybe-hello-world/pyproject-check-version@cb964e82b3c8a0b1cedb117da63e1761c46600b8 # v4
      - name: Update changelog
        if: steps.pyproject.outputs.local_version_is_higher == 'true'
        run: uv run keepachangelog release ${{  steps.pyproject.outputs.local_version }}
      - name: Debug changes
        run: |
          git status
          echo New version: ${{ steps.pyproject.outputs.local_version }}
          echo Changes:
          git diff
      - name: Commit and tag changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
        if: steps.pyproject.outputs.local_version_is_higher == 'true'
        with:
          message: "🔖 Release ${{ steps.pyproject.outputs.local_version }}"
          tag: v${{ steps.pyproject.outputs.local_version }}

